<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="热量追踪">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/app.css">
  <title>热量追踪</title>
</head>
<body>
  <div id="app">

    <!-- Home Page -->
    <div id="page-home" class="page active">
      <div class="header">
        <h1>热量追踪</h1>
        <button class="header-btn" id="btn-settings">⚙</button>
      </div>
      <div class="page-content" id="home-content">
        <div class="ring-container" id="ring-container"></div>
        <div class="macros" id="macros"></div>
        <div class="food-list-title">今日记录</div>
        <div id="food-list"></div>
      </div>
      <button class="fab" id="btn-capture">+</button>
    </div>

    <!-- History Page -->
    <div id="page-history" class="page">
      <div class="header">
        <button class="header-btn back-btn" id="btn-history-back">←</button>
        <h1>历史记录</h1>
        <button class="header-btn" id="btn-weekly-view">📊</button>
      </div>
      <div class="page-content" id="history-content"></div>
    </div>

    <!-- Weekly View Page -->
    <div id="page-weekly" class="page">
      <div class="header">
        <button class="header-btn back-btn" id="btn-weekly-back">←</button>
        <h1>周视图</h1>
        <div style="width:40px"></div>
      </div>
      <div class="page-content" id="weekly-content"></div>
    </div>

    <!-- Record Intake Page -->
    <div id="page-record" class="page">
      <div class="header">
        <button class="header-btn back-btn" id="btn-record-back">←</button>
        <h1 id="record-title">记录摄入</h1>
        <div style="width:40px"></div>
      </div>
      <div class="page-content" id="record-content"></div>
    </div>

    <!-- Food Database Page -->
    <div id="page-foods" class="page">
      <div class="header">
        <button class="header-btn back-btn" id="btn-foods-back">←</button>
        <h1>食物库</h1>
        <div style="width:40px"></div>
      </div>
      <div class="page-content" id="foods-content"></div>
    </div>

    <!-- Meal Templates Page -->
    <div id="page-templates" class="page">
      <div class="header">
        <button class="header-btn back-btn" id="btn-templates-back">←</button>
        <h1>餐食模板</h1>
        <div style="width:40px"></div>
      </div>
      <div class="page-content" id="templates-content"></div>
    </div>

    <!-- Settings Page -->
    <div id="page-settings" class="page">
      <div class="header">
        <button class="header-btn back-btn" id="btn-settings-back">←</button>
        <h1>设置</h1>
        <div style="width:40px"></div>
      </div>
      <div class="page-content" id="settings-content"></div>
    </div>

  </div>

  <script src="./js/db.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
